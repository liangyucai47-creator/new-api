services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${APP_IMAGE:-new-api-ecs:latest}
    container_name: ${APP_CONTAINER_NAME:-new-api}
    restart: unless-stopped
    command: --log-dir /app/logs
    ports:
      - "${APP_PUBLIC_PORT:-5041}:3000"
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      PORT: 3000
      SERVER_ADDRESS: ${SERVER_ADDRESS:-http://8.160.190.198}
      SQLITE_PATH: ${SQLITE_PATH:-/data/one-api.db?_busy_timeout=30000}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ERROR_LOG_ENABLED: ${ERROR_LOG_ENABLED:-true}
      BATCH_UPDATE_ENABLED: ${BATCH_UPDATE_ENABLED:-true}
      NODE_NAME: ${NODE_NAME:-ecs-node-1}
      INTERNAL_MODE: ${INTERNAL_MODE:-false}
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -q -O - http://localhost:3000/api/status | grep -o '\"success\":\\s*true' || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - new-api-ecs

  nginx:
    image: nginx:1.27-alpine
    container_name: ${NGINX_CONTAINER_NAME:-new-api-nginx}
    restart: unless-stopped
    depends_on:
      - new-api
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    environment:
      PUBLIC_HOST: ${PUBLIC_HOST:-8.160.190.198}
      UPSTREAM_HOST: new-api
      UPSTREAM_PORT: "3000"
      DOLLAR: "$"
    volumes:
      - ./deploy/ecs/nginx/${NGINX_TEMPLATE:-http.conf.template}:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/ecs/nginx/www:/var/www/certbot
      - ./deploy/ecs/nginx/certs:/etc/letsencrypt
    networks:
      - new-api-ecs

  certbot:
    image: certbot/certbot:latest
    profiles: ["tls"]
    volumes:
      - ./deploy/ecs/nginx/www:/var/www/certbot
      - ./deploy/ecs/nginx/certs:/etc/letsencrypt

  certbot-renew:
    image: certbot/certbot:latest
    container_name: ${CERTBOT_RENEW_CONTAINER_NAME:-new-api-certbot-renew}
    restart: unless-stopped
    profiles: ["tls"]
    volumes:
      - ./deploy/ecs/nginx/www:/var/www/certbot
      - ./deploy/ecs/nginx/certs:/etc/letsencrypt
    entrypoint: /bin/sh
    command:
      - -c
      - trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done

networks:
  new-api-ecs:
    driver: bridge
